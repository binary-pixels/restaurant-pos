version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pos_secret_change_me}
      POSTGRES_DB: restaurant_pos
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos"]
      interval: 5s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://pos:${DB_PASSWORD:-pos_secret_change_me}@postgres:5432/restaurant_pos
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production-min-32-chars}
      AUTH_URL: ${AUTH_URL:-https://your-domain.com}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
